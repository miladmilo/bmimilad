<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="src/output.css">
    <link rel="stylesheet" href="style.css">
    <title>Document</title>
</head>
<body>
    <header class="h-24 bg-gradient-to-l from-purple-100 via-pink-100 via-yellow-100 via-green-100 to-blue-400"></header>
    <main>
<section class="bg-gradient-to-r from-purple-100 via-pink-100 via-yellow-100 via-green-100 to-blue-400 w-[40%] m-auto flex justify-center text-center mt-7 rounded-xl flex-col gap-3 pb-3 pt-5">
        <h1 class="font-bold text-2xl mb-8">محاسبه شاخص توده بدن</h1>
            <div class="hight mb-6">
                <label for="height">قد</label>
                <input type="number" id="height" class="bg-gray-100 rounded-xl w-[50%] h-8 text-center placeholder:text-gray-300" placeholder="قد خود را به سانتیمتر وارد کنید">
            </div>
            <div class="wight mb-6">
                 <label for="weight">وزن</label>
                <input type="number" id="weight" class="bg-gray-100 rounded-xl w-[50%] h-8 text-center placeholder:text-gray-300" placeholder="وزن خود را به کیلوگرم وارد کنید">
            </div>

        <div class="sub">
            <button class="bg-gradient-to-l from-green-400 to-blue-300 rounded-xl px-6 py-1 hover:font-bold transform transition-all duration-100 mb-4" onclick="calculateBMI()">محاسبه</button>
        </div>
   


        <p id="result" class="text-center "></p>

</section>

    </main>
    <script src="bmi.js"></script>
</body>
</html>
